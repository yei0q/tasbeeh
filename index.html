<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 أيام · تتبع العبادات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --card: #1c2128;
  --gold: #d4a843;
  --gold-light: #f0c96e;
  --gold-dim: #d4a84344;
  --green: #3fb950;
  --green-dim: #3fb95033;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --border: #30363d;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
  background-image: 
    radial-gradient(ellipse at 20% 0%, #d4a84315 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, #3fb95015 0%, transparent 50%);
}

header {
  text-align: center;
  margin-bottom: 24px;
  padding: 20px;
}

header h1 {
  font-family: 'Amiri', serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--gold-light);
  margin-bottom: 6px;
}

header p { color: var(--text-muted); font-size: 0.88rem; }

.bismillah {
  font-family: 'Amiri', serif;
  font-size: 1.2rem;
  color: var(--gold);
  opacity: 0.8;
  margin-bottom: 4px;
}

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 1100px;
  margin: 0 auto 20px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.stat-num { font-size: 1.7rem; font-weight: 900; color: var(--gold-light); line-height: 1; }
.stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 1fr 200px;
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
  align-items: start;
}

/* Tracker scrollable on mobile */
.tracker-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 16px;
}

.tracker-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  min-width: 600px;
}

.tracker-header {
  display: grid;
  grid-template-columns: 210px repeat(10, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.th {
  padding: 11px 4px;
  text-align: center;
  font-size: 0.68rem;
  color: var(--text-muted);
  font-weight: 600;
  border-left: 1px solid var(--border);
}

.th:first-child {
  text-align: right;
  padding-right: 14px;
  border-left: none;
  color: var(--gold);
  font-size: 0.78rem;
}

.th.today-h { color: var(--gold-light); background: var(--gold-dim); }

.habit-row {
  display: grid;
  grid-template-columns: 210px repeat(10, 1fr);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.habit-row:last-child { border-bottom: none; }
.habit-row:hover { background: #ffffff05; }

.habit-name {
  padding: 12px 14px;
  font-size: 0.8rem;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
  border-right: 3px solid transparent;
  font-weight: 500;
  line-height: 1.3;
}

.habit-name.prayer { border-right-color: var(--gold); }
.habit-name.dhikr  { border-right-color: #58a6ff; }
.habit-name.quran  { border-right-color: #bc8cff; }

.habit-icon { font-size: 0.95rem; flex-shrink: 0; }

.day-cell {
  border-left: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
  min-height: 48px;
}

.day-cell.today-col { background: #d4a84308; }
.day-cell:not(.future):hover { background: var(--gold-dim); }

.check-box {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0;
  transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.day-cell.done .check-box {
  background: var(--green);
  border-color: var(--green);
  font-size: 13px;
  box-shadow: 0 0 10px var(--green-dim);
}

.day-cell.future { cursor: default; }
.day-cell.future .check-box { border-color: #ffffff12; opacity: 0.35; }

/* Progress */
.progress-section {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.76rem;
  color: var(--text-muted);
  margin-bottom: 7px;
}

.progress-bar {
  height: 5px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--green));
  border-radius: 99px;
  transition: width 0.4s ease;
}

/* ===== TASBEEH NEW DESIGN ===== */
.tasbeeh-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 16px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 20px;
  overflow: hidden;
}

/* Subtle background glow */
.tasbeeh-card::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%;
  transform: translateX(-50%);
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, #d4a84322 0%, transparent 70%);
  pointer-events: none;
}

.tasbeeh-title {
  font-size: 0.8rem;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  position: relative;
}

/* Simple circle design */
.tasbeeh-beads-wrap {
  position: relative;
  width: 160px;
  height: 160px;
  cursor: pointer;
  user-select: none;
}

.tasbeeh-beads-wrap:active { transform: scale(0.96); }

.beads-svg {
  width: 160px;
  height: 160px;
}

.tasbeeh-center-display { display: none; }

/* Center display */
.tasbeeh-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 2;
}

.tasbeeh-count {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--gold-light);
  line-height: 1;
  text-shadow: 0 0 20px #d4a84355;
}

.tasbeeh-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 3px;
}

/* Dhikr text */
.tasbeeh-dhikr {
  font-family: 'Amiri', serif;
  font-size: 1.1rem;
  color: var(--gold-light);
  text-align: center;
  line-height: 1.5;
  min-height: 2rem;
  position: relative;
}

/* Tap button */
.tasbeeh-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #c9973a, #e8b84b, #c9973a);
  background-size: 200% 200%;
  border: none;
  border-radius: 14px;
  color: #0d1117;
  font-family: 'Cairo', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
  box-shadow: 0 4px 15px #d4a84340, inset 0 1px 0 #f5d47844;
  position: relative;
  overflow: hidden;
}

.tasbeeh-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #ffffff33, transparent);
  transition: left 0.4s;
}

.tasbeeh-btn:hover::after { left: 150%; }
.tasbeeh-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px #d4a84355; }
.tasbeeh-btn:active { transform: scale(0.96); }

.tasbeeh-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  font-family: 'Cairo', sans-serif;
  font-size: 0.72rem;
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
}

.tasbeeh-reset:hover { border-color: var(--text-muted); color: var(--text); }

.tasbeeh-grand-wrap {
  font-size: 0.68rem;
  color: var(--text-muted);
  text-align: center;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  width: 100%;
}

/* Bead pulse */
@keyframes bead-pop {
  0%   { r: 7; opacity: 1; }
  50%  { r: 10; opacity: 0.9; }
  100% { r: 7; opacity: 1; }
}

.bead-active { animation: bead-pop 0.3s ease-out; }

@keyframes complete-flash {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Responsive */
@media (max-width: 780px) {
  .layout { grid-template-columns: 1fr; }
  .tasbeeh-card { position: static; flex-direction: row; flex-wrap: wrap; justify-content: center; }
  .tracker-header, .habit-row { grid-template-columns: 130px repeat(10, 1fr); }
  .habit-name { font-size: 0.7rem; padding: 9px 8px; }
  .th { font-size: 0.6rem; }
  .check-box { width: 22px; height: 22px; border-radius: 6px; }
}

@media (max-width: 480px) {
  body { padding: 10px; }
  .tracker-header, .habit-row { grid-template-columns: 95px repeat(10, 1fr); }
  .habit-name { font-size: 0.62rem; padding: 7px 5px; }
  .habit-icon { display: none; }
  .check-box { width: 18px; height: 18px; border-radius: 5px; }
  .day-cell { min-height: 40px; }
}
</style>
</head>
<body>

<header>
  <div class="bismillah">بسم الله الرحمن الرحيم</div>
  <h1>🌙 تتبع العبادات·&nbsp;&nbsp;&nbsp; ١٠ أيام</h1>
  <p>من ٩ مارس إلى ٢٠ مارس ٢٠٢٦</p>
</header>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="stat-done">0</div>
    <div class="stat-label">✅ مكتملة</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-pct">0%</div>
    <div class="stat-label">📊 نسبة الإنجاز</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-streak">0</div>
    <div class="stat-label">🔥 يوم متتالي</div>
  </div>
</div>

<div class="layout">

  <!-- TRACKER -->
  <div class="tracker-wrapper">
  <div class="tracker-card">
    <div class="tracker-header" id="tracker-header">
      <div class="th">العادة / اليوم</div>
    </div>
    <div class="tracker-body" id="tracker-body"></div>
    <div class="progress-section">
      <div class="progress-label">
        <span>التقدم الكلي</span>
        <span id="progress-text">0 / 130</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div><!-- end tracker-wrapper -->
  <div class="tasbeeh-card">
    <div class="tasbeeh-title">📿 السبحة</div>

    <div class="tasbeeh-beads-wrap" id="beads-wrap">
      <svg class="beads-svg" id="beads-svg" viewBox="0 0 160 160">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0c96e"/>
            <stop offset="100%" stop-color="#c9973a"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Background circle -->
        <circle cx="80" cy="80" r="70" fill="#1a1408" stroke="#2e2410" stroke-width="1.5"/>
        <!-- Track ring -->
        <circle cx="80" cy="80" r="62" fill="none" stroke="#2e2410" stroke-width="10"/>
        <!-- Progress arc -->
        <circle cx="80" cy="80" r="62" fill="none"
          stroke="url(#ringGrad)" stroke-width="10"
          stroke-linecap="round"
          stroke-dasharray="389.6"
          stroke-dashoffset="389.6"
          transform="rotate(-90 80 80)"
          id="progress-arc"
          filter="url(#glow)"/>
      </svg>
      <div class="tasbeeh-center">
        <div class="tasbeeh-count" id="tasbeeh-count">0</div>
        <div class="tasbeeh-sub" id="tasbeeh-sub">/ 100</div>
      </div>
    </div>

    <button class="tasbeeh-btn" id="tasbeeh-btn" onclick="tapTasbeeh()">اضغط للتسبيح</button>
    <button class="tasbeeh-reset" onclick="resetTasbeeh()">🔄 إعادة تعيين</button>

    <div class="tasbeeh-grand-wrap">
      المجموع الكلي<br>
      <strong style="color:var(--gold-light);font-size:1.1rem;" id="tasbeeh-grand">0</strong>
    </div>
  </div>

</div>

<script>
// ============ TRACKER ============
const habits = [
  { name: "الفجر",                              icon: "🌅", type: "prayer" },
  { name: "الظهر",                              icon: "☀️", type: "prayer" },
  { name: "العصر",                              icon: "🌤️", type: "prayer" },
  { name: "المغرب",                             icon: "🌇", type: "prayer" },
  { name: "العشاء",                             icon: "🌙", type: "prayer" },
  { name: "التراويح",                           icon: "🕌", type: "prayer" },
  { name: "قيام ليل",                           icon: "⭐", type: "prayer" },
  { name: "وتر",                                icon: "🤲", type: "prayer" },
  { name: "صدقة",                               icon: "💛", type: "dhikr"  },
  { name: "اللهم إنك عفو تحب العفو فاعف عني",  icon: "🤍", type: "dhikr"  },
  { name: "سبحان الله وبحمده · 100 مرة",        icon: "📿", type: "dhikr"  },
  { name: "سبحان الله العظيم وبحمده · 100 مرة", icon: "📿", type: "dhikr"  },
  { name: "سورة الإخلاص ٣ مرات",               icon: "📖", type: "quran"  },
];

const dayNames = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const startDate = new Date(2026, 2, 9);
const days = Array.from({length: 10}, (_, i) => {
  const d = new Date(startDate);
  d.setDate(startDate.getDate() + i);
  return d;
});

const today = new Date();
today.setHours(0,0,0,0);

let state = JSON.parse(localStorage.getItem('ht2026') || '{}');

const headerEl = document.getElementById('tracker-header');
days.forEach((d, i) => {
  const isToday = d.getTime() === today.getTime();
  const th = document.createElement('div');
  th.className = 'th' + (isToday ? ' today-h' : '');
  th.innerHTML = `<div>${dayNames[d.getDay()]}</div><div style="font-size:0.9em;font-weight:900">${d.getDate()}</div>`;
  headerEl.appendChild(th);
});

const bodyEl = document.getElementById('tracker-body');
habits.forEach((h, hi) => {
  const row = document.createElement('div');
  row.className = 'habit-row';

  const nameCell = document.createElement('div');
  nameCell.className = `habit-name ${h.type}`;
  nameCell.innerHTML = `<span class="habit-icon">${h.icon}</span><span>${h.name}</span>`;
  row.appendChild(nameCell);

  days.forEach((d, di) => {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    const isFuture = d.getTime() > today.getTime();
    const key = `${hi}-${di}`;

    if (d.getTime() === today.getTime()) cell.classList.add('today-col');
    if (state[key]) cell.classList.add('done');
    if (isFuture) cell.classList.add('future');

    const box = document.createElement('div');
    box.className = 'check-box';
    box.textContent = state[key] ? '✓' : '';
    cell.appendChild(box);

    if (!isFuture) {
      cell.addEventListener('click', () => {
        if (state[key]) { delete state[key]; cell.classList.remove('done'); box.textContent = ''; }
        else { state[key] = 1; cell.classList.add('done'); box.textContent = '✓'; }
        localStorage.setItem('ht2026', JSON.stringify(state));
        updateStats();
      });
    }
    row.appendChild(cell);
  });

  bodyEl.appendChild(row);
});

function updateStats() {
  const total = habits.length * 10;
  const done = Object.values(state).filter(v => v === 1).length;
  const pct = Math.round(done / total * 100);

  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = pct + '%';

  let streak = 0, cur = 0;
  for (let di = 0; di < 10; di++) {
    if (days[di].getTime() > today.getTime()) break;
    const full = habits.every((_, hi) => state[`${hi}-${di}`]);
    if (full) { cur++; streak = Math.max(streak, cur); }
    else cur = 0;
  }
  document.getElementById('stat-streak').textContent = streak;
}
updateStats();

// ============ TASBEEH ============
const TOTAL_BEADS = 100;
const CIRC = 2 * Math.PI * 62;

let tc = parseInt(localStorage.getItem('t-c') || '0');
let tg = parseInt(localStorage.getItem('t-g') || '0');

function renderBeads() {
  const arc = document.getElementById('progress-arc');
  arc.style.strokeDashoffset = CIRC * (1 - tc / TOTAL_BEADS);
  document.getElementById('tasbeeh-count').textContent = tc;
  document.getElementById('tasbeeh-sub').textContent = '/ ' + TOTAL_BEADS;
  document.getElementById('tasbeeh-grand').textContent = tg;
}

renderBeads();

function tapTasbeeh() {
  if (tc >= TOTAL_BEADS) return;
  tc++; tg++;

  const arc = document.getElementById('progress-arc');
  arc.style.strokeDashoffset = CIRC * (1 - tc / TOTAL_BEADS);
  document.getElementById('tasbeeh-count').textContent = tc;
  document.getElementById('tasbeeh-grand').textContent = tg;

  if (tc >= TOTAL_BEADS) {
    const btn = document.getElementById('tasbeeh-btn');
    btn.textContent = '✨ ماشاء الله! ١٠٠';
    btn.style.background = 'linear-gradient(135deg, #2a7a3a, #3fb950)';
    btn.style.color = '#fff';
    setTimeout(() => {
      btn.textContent = 'اضغط للتسبيح';
      btn.style.background = '';
      btn.style.color = '';
    }, 2000);
  }

  localStorage.setItem('t-c', tc);
  localStorage.setItem('t-g', tg);
}

function resetTasbeeh() {
  tc = 0;
  localStorage.setItem('t-c', 0);
  renderBeads();
}
</script>
</body>
</html>
